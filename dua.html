<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>A shared dua · Ma'thurat Global</title>
<meta name="description" content="A dua shared with you via Ma'thurat Global — read it here or open it in the app." />

<!-- Rich preview in chat apps -->
<meta property="og:title" content="A dua shared with you" />
<meta property="og:description" content="Read it here, or open it in Ma'thurat Global." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Hira" />
<meta name="theme-color" content="#0D0B1C" />

<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Amiri:wght@400;700&display=swap" />

<style>
  :root {
    --bg: #0D0B1C; --bg-soft: #12101F; --bg-elev: #181530;
    --ink: #EFEDF7; --ink-mute: #A6A1C4; --ink-dim: #6F6A96;
    --line: rgba(160,157,226,0.16); --line-soft: rgba(160,157,226,0.07);
    --violet-100: #E9E6FA; --violet-300: #C7C2F0; --violet-400: #A09DE2;
    --violet-500: #7B6FF0; --violet-600: #5B4FCF;
    --grad: linear-gradient(135deg, #5B4FCF 0%, #7B6FF0 55%, #A09DE2 100%);
    --radius: 14px; --radius-lg: 22px;
    --shadow-glow: 0 30px 80px -20px rgba(91,79,207,0.45);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F7F5FC; --bg-soft: #FFFFFF; --bg-elev: #FFFFFF;
      --ink: #191533; --ink-mute: #55506E; --ink-dim: #8A85A8;
      --line: rgba(91,79,207,0.14); --line-soft: rgba(91,79,207,0.07);
      --shadow-glow: 0 30px 80px -20px rgba(91,79,207,0.22);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(120% 90% at 90% 100%, rgba(91,79,207,0.18) 0%, transparent 55%),
      radial-gradient(90% 70% at 6% 4%, rgba(160,157,226,0.10) 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 18px 44px; line-height: 1.5;
  }
  /* faint grid, like the main site */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(circle at 50% 30%, #000 0%, transparent 75%);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin: 6px 0 24px; }
  .brand img { width: 20px; height: auto; }
  .brand .word { font-weight: 600; font-size: 16px; letter-spacing: 0.3px; }
  .brand .word span { color: var(--violet-400); }
  .banner {
    display: flex; align-items: center; gap: 9px; width: 100%; max-width: 520px;
    background: rgba(123,111,240,0.10); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 11px 14px; margin-bottom: 14px;
    font-size: 13.5px; color: var(--ink-mute);
  }
  .card {
    width: 100%; max-width: 520px; background: color-mix(in oklab, var(--bg-elev) 70%, transparent);
    border: 1px solid var(--line); border-radius: var(--radius-lg);
    padding: 28px 22px; text-align: center; box-shadow: var(--shadow-glow);
    backdrop-filter: blur(8px);
  }
  .label { font-size: 13px; font-weight: 500; color: var(--ink-mute); margin: 0 0 16px; }
  .arabic { font-family: 'Amiri', serif; direction: rtl; font-size: 31px; line-height: 1.95; margin: 4px 0 16px; color: var(--ink); }
  .translit { font-style: italic; font-size: 14px; color: var(--ink-mute); margin: 0 0 12px; }
  .trans { background: rgba(123,111,240,0.09); border-radius: var(--radius); padding: 14px; font-size: 14.5px; line-height: 1.7; margin: 6px 0; color: var(--ink); }
  .ref { font-size: 12px; color: var(--ink-dim); margin-top: 12px; }
  .actions { width: 100%; max-width: 520px; margin-top: 18px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    text-decoration: none; font-weight: 600; font-size: 15px; padding: 15px 20px;
    border-radius: 16px; border: none; cursor: pointer; color: #fff;
    background: var(--grad); box-shadow: 0 12px 30px -10px rgba(91,79,207,0.5);
  }
  .muted { font-size: 13px; color: var(--ink-mute); text-decoration: none; }
  .muted:hover { color: var(--violet-300); }
  .empty { text-align: center; color: var(--ink-mute); max-width: 380px; margin-top: 64px; }
  .foot { margin-top: 28px; font-size: 11.5px; color: var(--ink-dim); }
  .foot a { color: var(--ink-mute); text-decoration: none; }
</style>
</head>
<body>
  <a class="brand" href="/" style="text-decoration:none;color:inherit;">
    <img src="assets/brand/mark-gradient.png" alt="" width="20" height="33" />
    <span class="word">Ma&rsquo;thurat <span>Global</span></span>
  </a>

  <div id="root"></div>

  <script>
    // The Masoorat app registers the `masoorat://` scheme and routes
    // `receive?d=<payload>` to its "Shared With You" screen
    // (see src/utils/duaLink.ts / app/receive.tsx in the app repo).
    var APP_SCHEME = 'masoorat://receive';
    var LEARN_MORE = 'https://hiracircle.com/#mathurat';

    function getRawParam(name) {
      var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return m ? m[1] : null;
    }
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    var raw = getRawParam('d');
    var payload = null;
    if (raw) { try { payload = JSON.parse(decodeURIComponent(raw)); } catch (e) { payload = null; } }

    var root = document.getElementById('root');

    if (!payload || typeof payload.t !== 'string' || typeof payload.a !== 'string') {
      root.innerHTML = '<p class="empty">This shared dua link is invalid or incomplete.</p>';
    } else {
      var appUrl = APP_SCHEME + '?d=' + raw; // reuse the already-encoded payload
      root.innerHTML = ''
        + '<div class="banner">🎁 Someone shared this dua with you.</div>'
        + '<div class="card">'
        +   '<p class="label">' + esc(payload.t) + '</p>'
        +   '<div class="arabic">' + esc(payload.a) + '</div>'
        +   (payload.l ? '<p class="translit">' + esc(payload.l) + '</p>' : '')
        +   (payload.x ? '<div class="trans">' + esc(payload.x) + '</div>' : '')
        +   (payload.r ? '<p class="ref">— ' + esc(payload.r) + '</p>' : '')
        + '</div>'
        + '<div class="actions">'
        +   '<a class="btn" href="' + esc(appUrl) + '">Open in Ma\'thurat Global</a>'
        +   '<a class="muted" href="' + LEARN_MORE + '">Don\'t have the app? Learn more →</a>'
        + '</div>'
        + '<div class="foot">Open this link on your phone to save the dua to your collection · '
        +   '<a href="https://hiracircle.com">Hira</a></div>';
    }
  </script>
</body>
</html>
