[build]
  publish = "."

# Tester landing page: the "12 testers" post links to https://hiracircle.com/testers
[[redirects]]
  from = "/testers"
  to = "/testers.html"
  status = 200

[[redirects]]
  from = "/beta"
  to = "/testers.html"
  status = 301

# Shared-dua landing page: app shares point at https://hiracircle.com/dua?d=…
# Serve dua.html at the clean /dua path (rewrite, keeps the URL + query string).
[[redirects]]
  from = "/dua"
  to = "/dua.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS/JS share a stable filename, so revalidate every visit (cheap 304 via
# ETag) — this keeps the site fresh during active iteration and launch.
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
