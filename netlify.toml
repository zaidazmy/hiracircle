[build]
  publish = "."

# Shared-dua landing page: app shares point at https://hiracircle.com/dua?d=…
# Serve dua.html at the clean /dua path (rewrite, keeps the URL + query string).
[[redirects]]
  from = "/dua"
  to = "/dua.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "public, max-age=86400"
